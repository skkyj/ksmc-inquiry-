<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSMC Inquiry Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            line-height: 1.6;
            letter-spacing: -0.01em;
            padding: 50px 20px;
            margin: 0;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid #e2e8f0;
        }
        h2 {
            margin-top: 0;
            font-size: 2.15em;
            font-weight: 700;
            color: #0f172a;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 18px;
            letter-spacing: -0.03em;
        }
        .inquiry-id {
            font-size: 0.85em;
            font-weight: 500;
            color: #475569;
            margin-bottom: 30px;
            background: #f1f5f9;
            padding: 8px 14px;
            border-radius: 6px;
            display: inline-block;
            letter-spacing: 0.02em;
        }
        .form-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            font-size: 0.92em;
            font-weight: 600;
            margin-bottom: 6px;
            color: #334155;
        }
        .required {
            color: #ef4444;
            font-weight: 700;
            margin-left: 3px;
            font-size: 1.1em;
        }
        .sub-label {
            font-size: 0.82em;
            color: #64748b;
            display: block;
            margin-bottom: 8px;
            margin-top: -2px;
        }
        input[type="text"],
        input[type="email"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 0.95em;
            color: #1e293b;
            background-color: #fff;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
        }

        .section-header {
            margin: 45px 0 25px 0;
            display: flex;
            align-items: center;
        }
        .section-title {
            font-size: 1.25em;
            color: #0f172a;
            font-weight: 700;
            letter-spacing: -0.01em;
            white-space: nowrap;
            margin: 0;
        }
        .section-line {
            flex-grow: 1;
            height: 1px;
            background-color: #e2e8f0;
            margin-left: 15px;
        }

        button[type="submit"] {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 0.95em;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.15s ease;
            letter-spacing: 0.01em;
            margin-top: 10px;
        }
        button[type="submit"]:hover {
            background-color: #1d4ed8;
        }

        #response {
            display: none;
            margin-top: 20px;
            padding: 14px;
            border-radius: 6px;
            font-size: 0.92em;
            font-weight: 500;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>KSMC Inquiry Platform</h2>
    
    <div class="inquiry-id" id="inquiryIdDisplay">Initializing session...</div>

    <form id="webhookForm" action="#" method="POST">
        
        <input type="hidden" id="inquiryDateBase" name="inquiryDateBase">
        <input type="hidden" id="inquiry_id" name="inquiry_id">

        <div class="form-group">
            <label for="market">Market<span class="required">*</span></label>
            <input type="text" id="market" name="market" list="market_list" placeholder="e.g., Automotive, IoT, Industrial" required>
            <datalist id="market_list">
                <option value="Automotive">
                <option value="Industrial & Automation">
                <option value="Consumer Electronics">
                <option value="IoT (Internet of Things)">
                <option value="Computing & Data Centers">
                <option value="Communications & 5G">
                <option value="Aerospace & Defense">
                <option value="Medical Devices">
            </datalist>
        </div>

        <div class="form-group">
            <label for="customer_name">Customer Name<span class="required">*</span></label>
            <input type="text" id="customer_name" name="customer_name" placeholder="Enter company or client name" required>
        </div>

        <div class="form-group">
            <label for="customer_email">Customer Email Address<span class="required">*</span></label>
            <input type="email" id="customer_email" name="customer_email" placeholder="name@company.com" required>
        </div>

        <div class="form-group">
            <label for="customer_phone">Customer Phone Number<span class="required">*</span></label>
            <input type="text" id="customer_phone" name="customer_phone" placeholder="e.g., +1 123-456-7890 or 010-1234-5678" required>
            <span class="sub-label">Accepts international codes, spaces, dashes, and numbers.</span>
        </div>

<script>
    function generateInquiryBase() {
        const today = new Date();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        const yyyy = today.getFullYear();
        
        const dateStr = `${mm}${dd}${yyyy}`;
        
        const uniqueSuffix = Math.floor(1000 + Math.random() * 9000);
        const fullInquiryId = `INQ-${dateStr}-${uniqueSuffix}`;
        
        document.getElementById('inquiryDateBase').value = dateStr;
        document.getElementById('inquiry_id').value = fullInquiryId; 
        
        document.getElementById('inquiryIdDisplay').innerHTML = `Current Inquiry ID: <strong>${fullInquiryId}</strong>`;
    }

    generateInquiryBase();

    document.getElementById('webhookForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const responseDiv = document.getElementById('response');
        const submitBtn = this.querySelector('button[type="submit"]');

        //  webhook-test → webhook 으로 변경 (Production URL: 항상 열려있음)
        const webhookUrl = 'http://115.145.13.38:10018/webhook/6961e620-d339-4d01-ada6-70a0d7b690ec';

        //  n8n 워크플로우가 기대하는 필드명으로 매핑
        const payload = {
            "Inquiry ID":             document.getElementById('inquiry_id').value,
            "Market":                 document.getElementById('market').value,
            "Customer":               document.getElementById('customer_name').value,
            "Email":                  document.getElementById('customer_email').value,
            "Tel":                    document.getElementById('customer_phone').value,
            "Chip":                   document.getElementById('chip_id').value,
            "Q'ty":                   document.getElementById('quantity').value,
            "Ship To":                document.getElementById('destination').value,
            "Target Price":           document.getElementById('target_price').value,
            "Technical Requirement":  document.getElementById('technical_requirement').value,
            "Quality Compliance":     document.getElementById('quality_compliance').value,
            "Remarks":                document.getElementById('customer_remarks').value,
        };

        responseDiv.style.display = 'block';
        responseDiv.style.backgroundColor = '#e1f5fe';
        responseDiv.style.color = '#0288d1';
        responseDiv.innerText = 'Submitting inquiry to KSMC backend...';
        submitBtn.disabled = true;

        try {
            const response = await fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                responseDiv.style.backgroundColor = '#e8f5e9';
                responseDiv.style.color = '#2e7d32';
                responseDiv.innerText = 'Success! Your inquiry (' + payload["Inquiry ID"] + ') has been submitted.';
                this.reset();
                generateInquiryBase();
            } else {
                throw new Error('Server error: HTTP ' + response.status);
            }
        } catch (error) {
            responseDiv.style.backgroundColor = '#ffebee';
            responseDiv.style.color = '#c62828';
            responseDiv.innerText = '❌ Submission Error: ' + error.message;
        } finally {
            submitBtn.disabled = false;
        }
    });
</script>
